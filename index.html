
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Fretboard</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none; /* Prevents zooming/scrolling while playing */
        }
        #fretboard {
            display: grid;
            grid-template-columns: repeat(10, 13mm);
            grid-template-rows: repeat(6, 10mm);
            margin-top: 5mm;
            padding: 5mm;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: inset 0 0 10px #000;
        }
        .note-btn {
            width: 7mm;
            height: 7mm;
            border-radius: 50%;
            border: 1px solid #444;
            background: radial-gradient(circle at 30% 30%, #eee, #777);
            box-shadow: 0 3px 6px rgba(0,0,0,0.6);
            cursor: pointer;
            justify-self: center;
            align-self: center;
            transition: transform 0.05s;
        }
        .note-btn:active {
            background: #ffd700;
            transform: scale(1.1);
            box-shadow: 0 0 15px #ffd700;
        }
        .label { color: #888; font-size: 12px; margin: 10px 0; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="label">HIGH E (TOP) → LOW E (BOTTOM)</div>
    <div id="fretboard"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const fretboard = document.getElementById('fretboard');

        // New Order: High e (E4), B3, G3, D3, A2, Low E (E2)
        const stringBaseFreqs = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41]; 

        function playNote(frequency) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // 'triangle' sounds like a clean guitar; 'sine' is even purer
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // Initial volume and then fade
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

        stringBaseFreqs.forEach((baseFreq) => {
            for (let fret = 0; fret < 12; fret++) {
                const btn = document.createElement('button');
                btn.className = 'note-btn';
                
                // Frequency formula for Western chromatic scale
                const freq = baseFreq * Math.pow(2, fret / 12);
                
                // Works for both mouse and touch
                btn.onmousedown = () => playNote(freq);
                btn.ontouchstart = (e) => {
                    e.preventDefault();
                    playNote(freq);
                };
                
                fretboard.appendChild(btn);
            }
        });
    </script>
</body>
</html>
