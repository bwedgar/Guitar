
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pocket Fretboard</title>
    <style>
        /* Layout Logic: 
           - Highest string (e) at the bottom.
           - 10 buttons wide.
           - Buttons fill the screen.
           - Removed text labels.
        */
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        #fretboard {
            display: grid;
            /* 10 columns to fill the width */
            grid-template-columns: repeat(10, 1fr);
            /* 6 rows to fill the height */
            grid-template-rows: repeat(6, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 2px; /* Small gap between buttons like frets */
            background: #000;
        }

        .note-btn {
            width: 100%;
            height: 100%;
            border: none;
            /* Wider, flatter appearance (Rectangular) */
            background: linear-gradient(to bottom, #444, #222);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* The 'string' visual line in the middle of the button */
        .note-btn::after {
            content: "";
            display: block;
            width: 100%;
            height: 1px;
            background: #888;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
            position: relative;
            top: 0;
        }

        .note-btn:active {
            background: #555;
            filter: brightness(1.5);
        }
    </style>
</head>
<body>

    <div id="fretboard"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const fretboard = document.getElementById('fretboard');

        // REVERSED ORDER: Low E (Top of screen) to High e (Bottom of screen)
        // E2, A2, D3, G3, B3, E4
        const stringBaseFreqs = [82.41, 110.00, 146.83, 196.00, 246.94, 329.63]; 

        function playNote(frequency) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.0);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.0);
        }

        // Loop through strings
        stringBaseFreqs.forEach((baseFreq) => {
            // Loop through 10 frets (per your request)
            for (let fret = 0; fret < 10; fret++) {
                const btn = document.createElement('button');
                btn.className = 'note-btn';
                
                const freq = baseFreq * Math.pow(2, fret / 12);
                
                btn.onmousedown = () => playNote(freq);
                btn.ontouchstart = (e) => {
                    e.preventDefault();
                    playNote(freq);
                };
                
                fretboard.appendChild(btn);
            }
        });
    </script>
</body>
</html>
</body>
</html>
