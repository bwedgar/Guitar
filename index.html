<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pocket Fretboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: top;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        #fretboard {
            display: grid;
            /* 10 columns (frets) */
            grid-template-columns: repeat(10, 1fr);
            /* 6 rows (strings) */
            grid-template-rows: repeat(6, .6fr);
            width: 100vw;
            height: 60vh;
            gap: 1px; /* Visual "fret" lines */
            background: #444; /* Fret color */
        }

        .note-btn {
            width: 100%;
            height: 100%;
            border: none;
            background: #1a1a1a;
            cursor: pointer;
            outline: none;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* The 'string' visual line */
        .string-line {
            width: 100%;
            background: #aaa;
            box-shadow: 0 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .note-btn:active {
            background: #333;
            filter: brightness(1.8);
        }
    </style>
</head>
<body>

    <div id="fretboard"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const fretboard = document.getElementById('fretboard');

        // VERTICAL ORDER: Low E (top) to High e (bottom)
        const stringBaseFreqs = [82.41, 110.00, 146.83, 196.00, 246.94, 329.63]; 
        
        // String thickness mapping (visual only)
        const stringHeights = [4, 3.5, 3, 2.5, 1.5, 1];

        stringBaseFreqs.forEach((baseFreq, stringIndex) => {
            for (let fret = 0; fret < 10; fret++) {
                const btn = document.createElement('button');
                btn.className = 'note-btn';
                
                // PITCH LOGIC: baseFreq * 2^(fret/12)
                // Pitch now correctly INCREASES as 'fret' goes from 0 to 9
                const freq = baseFreq * Math.pow(2,(10-fret) / 12);
                
                // Visual string line
                const line = document.createElement('div');
                line.className = 'string-line';
                line.style.height = stringHeights[stringIndex] + 'px';
                btn.appendChild(line);

                btn.onmousedown = () => playNote(freq);
                btn.ontouchstart = (e) => {
                    e.preventDefault();
                    playNote(freq);
                };
                
                fretboard.appendChild(btn);
            }
        });

        function playNote(frequency) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.0);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.0);
        }
    </script>
</body>
</html>
